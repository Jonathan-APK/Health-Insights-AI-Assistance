<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SSE Chat Test</title>

<style>
body {
  font-family: Arial;
  margin: 40px;
}

input, textarea {
  width: 400px;
  margin-bottom: 10px;
}

#log {
  margin-top: 20px;
  border: 1px solid #ccc;
  padding: 10px;
  height: 300px;
  width: 700px;
  overflow-y: auto;
  background: #f6f6f6;
  white-space: pre-wrap;
}

#sessionBox {
  margin-bottom: 15px;
  padding: 10px;
  background: #eef;
  border: 1px solid #aac;
}
</style>
</head>

<body>

<h2>SSE Chat Tester</h2>

<!-- Session display -->
<div id="sessionBox">
  <strong>Active Session:</strong>
  <span id="activeSession">None</span>
  <br><br>
  <button onclick="clearSession()">Reset Session</button>
</div>

<div>
<label>Manual Session ID (optional override)</label><br>
<input id="sessionId" placeholder="x-session-id">
</div>

<div>
<label>Message</label><br>
<textarea id="message" rows="3"></textarea>
</div>

<div>
<label>Upload File</label><br>
<input type="file" id="file">
</div>

<br>
<button onclick="send()">Send Request</button>

<h3>Stream Output</h3>
<div id="log"></div>

<script>

let storedSessionId = localStorage.getItem("session_id") || null

function updateSessionUI() {
  document.getElementById("activeSession").innerText = storedSessionId || "None"
}

function clearSession() {
  storedSessionId = null
  localStorage.removeItem("session_id")
  updateSessionUI()
  document.getElementById("log").textContent = "Session cleared.\n"
}

updateSessionUI()

async function send() {

  const log = document.getElementById("log")
  log.textContent = ""

  const form = new FormData()

  const message = document.getElementById("message").value
  const file = document.getElementById("file").files[0]
  const manualSessionId = document.getElementById("sessionId").value

  if (message) form.append("message", message)
  if (file) form.append("file", file)

  const headers = {
    "Accept": "text/event-stream"
  }

  // priority: manual input > stored session
  const sessionToSend = manualSessionId || storedSessionId

  if (sessionToSend) {
    headers["X-Session-ID"] = sessionToSend
  }

  const response = await fetch("http://localhost:8000/v1/chat", {
    method: "POST",
    headers: headers,
    body: form
  })

  // read session from response header
  const returnedSession = response.headers.get("x-session-id")

  if (returnedSession && returnedSession !== storedSessionId) {
    storedSessionId = returnedSession
    localStorage.setItem("session_id", storedSessionId)
    updateSessionUI()

    log.textContent += `[Session Updated] ${storedSessionId}\n\n`
  }

  const reader = response.body.getReader()
  const decoder = new TextDecoder()

  let buffer = ""

  while (true) {

    const { value, done } = await reader.read()
    if (done) break

    buffer += decoder.decode(value, { stream: true })

    let parts = buffer.split("\n\n")

    for (let i = 0; i < parts.length - 1; i++) {

      const line = parts[i]

      if (line.startsWith("data:")) {

        const json = line.replace("data:", "").trim()

        try {
          const parsed = JSON.parse(json)
          log.textContent += JSON.stringify(parsed, null, 2) + "\n\n"
        } catch {
          log.textContent += json + "\n"
        }

        log.scrollTop = log.scrollHeight
      }
    }

    buffer = parts[parts.length - 1]
  }
}

</script>

</body>
</html>
