name: health-insights-ai

services:
  redis:
    image: redis:latest        # uses your existing local redis image
    container_name: redis-server
    ports:
      - "7001:6379"            # expose to host for local dev access
    volumes:
      - redis_data:/data       # persist session data across restarts
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    container_name: health-insights-ai
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis-server:6379  # use container_name as hostname
    depends_on:
      redis:
        condition: service_healthy           # waits until Redis passes ping check

volumes:
  redis_data:
